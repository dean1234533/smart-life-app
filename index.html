<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Smart Life</title>

    <!-- PWA manifest -->
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- iOS PWA support -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Smart Life" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" sizes="180x180" />

    <!-- Theme / branding -->
    <meta name="application-name" content="Smart Life" />
    <meta name="theme-color" content="#0d1520" />
    <meta name="description" content="Your AI-powered life organizer" />
  </head>
  <body>
    <!-- Force-clear stale service workers from old app versions.
         Increment SW_VERSION whenever a cached old SW is causing problems. -->
    <script>
      (function () {
        var SW_VERSION = '3';
        var KEY = 'sw-cleared-v';
        if ('serviceWorker' in navigator && localStorage.getItem(KEY) !== SW_VERSION) {
          navigator.serviceWorker.getRegistrations().then(function (regs) {
            if (regs.length === 0) { localStorage.setItem(KEY, SW_VERSION); return; }
            Promise.all(regs.map(function (r) { return r.unregister(); })).then(function () {
              localStorage.setItem(KEY, SW_VERSION);
              location.reload();
            });
          });
        }
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
